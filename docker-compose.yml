version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: t2507e_db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: t2507e_db
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express:latest
    container_name: t2507e_mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:

      # Kết nối đến container mongodb ở trên
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: root
      ME_CONFIG_MONGODB_SERVER: mongodb
      # Tài khoản/mật khẩu để đăng nhập vào giao diện Web Mongo Express
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin

volumes:
  mongo_data:
